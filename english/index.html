<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>考研英语词汇 - 极简背单词</title>
    <style>
        :root{--sidebar-width:260px;--primary:#c0392b;--primary-light:rgba(192,57,43,0.08);--bg:#f8f6f3;--text:#2c2c2c;--text-secondary:#777;--border:rgba(0,0,0,0.06)}
        *{margin:0;padding:0;box-sizing:border-box}
        body,html{height:100%;width:100%;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);overflow:hidden;user-select:none}
        .sidebar{position:fixed;top:0;left:0;bottom:0;width:var(--sidebar-width);background:rgba(255,255,255,0.85);backdrop-filter:blur(16px);border-right:1px solid var(--border);overflow-y:auto;z-index:100;padding:16px 0;transition:transform .3s cubic-bezier(0.16,1,0.3,1)}
        .sidebar::-webkit-scrollbar{width:4px}
        .sidebar::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.08);border-radius:4px}
        .sidebar-section{padding:8px 0;border-bottom:1px solid rgba(0,0,0,0.04)}
        .sidebar-section:last-child{border-bottom:none}
        .sidebar-title{font-size:10px;text-transform:uppercase;letter-spacing:3px;color:var(--primary);font-weight:800;padding:0 18px;margin-bottom:6px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;user-select:none}
        .sidebar-title::after{content:'▾';font-size:10px;transition:transform .2s;color:var(--text-secondary)}
        .sidebar-section.collapsed .sidebar-title::after{transform:rotate(-90deg)}
        .sidebar-section.collapsed .sidebar-section-body{display:none}
        .nav-btns{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);display:flex;gap:16px;pointer-events:auto}
        .nav-btn{width:56px;height:56px;border-radius:50%;border:1px solid rgba(0,0,0,0.08);background:rgba(255,255,255,0.85);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.3s cubic-bezier(0.16,1,0.3,1);font-size:22px;color:var(--text-secondary)}
        .nav-btn:hover{border-color:rgba(192,57,43,0.3);color:var(--primary);background:rgba(255,255,255,0.95)}
        .nav-btn:active{transform:scale(0.92)}
        .nav-btn:disabled{opacity:0.3;cursor:not-allowed}
        .sidebar-back{display:flex;align-items:center;gap:6px;padding:8px 18px;color:var(--text-secondary);text-decoration:none;font-size:13px;font-weight:500;transition:.2s}
        .sidebar-back:hover{color:var(--primary)}
        .sidebar .pill{display:block;margin:4px 12px;width:calc(100% - 24px);text-align:left}
        .sidebar .search-box{padding:0 12px}
        .sidebar .search-box input{width:100%}
        .sidebar .search-box input:focus{width:100%}
        .menu-toggle{display:none;position:fixed;top:12px;left:12px;z-index:150;background:rgba(255,255,255,0.85);backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:10px;padding:8px 12px;font-size:18px;cursor:pointer;color:var(--text)}
        .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:90}
        .sidebar-overlay.show{display:block}
        .pill{padding:4px 12px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid rgba(0,0,0,0.08);background:#fff;color:#777;transition:0.3s cubic-bezier(0.16,1,0.3,1);white-space:nowrap}
        .pill:hover{background:rgba(192,57,43,0.04);color:var(--primary);border-color:rgba(192,57,43,0.15)}
        .pill.active{background:var(--primary-light);color:var(--primary);border-color:rgba(192,57,43,0.2)}
        .pill.active-sub{background:rgba(192,57,43,0.1);color:var(--primary);border-color:rgba(192,57,43,0.2)}
        .pill.gp{background:rgba(192,57,43,0.06);color:var(--primary);border-color:rgba(192,57,43,0.12);font-weight:600}
        .pill.gp.active{background:rgba(192,57,43,0.1);border-color:rgba(192,57,43,0.2)}
        .tag{font-size:13px;font-weight:bold;color:#999;background:rgba(0,0,0,0.03);padding:5px 10px;border-radius:8px}
        .search-box{pointer-events:auto}
        .search-box input{padding:5px 12px;border-radius:20px;border:1px solid rgba(0,0,0,0.08);font-size:14px;outline:none;transition:0.3s cubic-bezier(0.16,1,0.3,1);background:#fff;color:var(--text)}
        .search-box input:focus{border-color:rgba(192,57,43,0.3)}
        .search-box input::placeholder{color:#ccc}
        #main-screen{height:100%;margin-left:var(--sidebar-width);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;cursor:pointer;position:relative}
        .word-card{width:90%;max-width:800px;padding:20px}
        .word-line{font-size:72px;font-weight:800;margin-bottom:8px;letter-spacing:-1px}
        .def-item{font-size:26px;line-height:1.5;margin-bottom:8px;color:#1d1d1f}
        .page-info{font-size:14px;color:#999;margin-top:16px}
        #fav-btn.active{color:#FF3B30}
        .hint{position:absolute;bottom:16px;font-size:12px;color:#ccc}
        #sr{display:none;position:fixed;top:50%;left:calc(var(--sidebar-width) + (100% - var(--sidebar-width)) / 2);transform:translate(-50%,-50%);width:90%;max-width:560px;max-height:65vh;overflow-y:auto;background:#fff;border-radius:16px;box-shadow:0 8px 40px rgba(0,0,0,.15);z-index:110;padding:10px}
        #sr.show{display:block}
        .si{padding:8px 12px;border-radius:10px;cursor:pointer;border-bottom:1px solid rgba(0,0,0,0.04)}
        .si:hover{background:rgba(192,57,43,0.02)}
        .si:last-child{border-bottom:none}
        .si-w{font-size:17px;font-weight:700}
        .si-d{font-size:13px;color:#999;margin-top:2px}
        .si-p{font-size:11px;color:var(--primary);margin-top:1px}
        #bv{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#fff;z-index:200;overflow-y:auto;padding:16px;box-sizing:border-box}
        #bv.show{display:block}
        .bg{margin-bottom:20px}
        .bgt{font-size:17px;font-weight:700;color:var(--primary);padding:8px 0;border-bottom:2px solid rgba(192,57,43,0.15);margin-bottom:8px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
        .bgt .ct{font-size:13px;color:#999;font-weight:400}
        .bgt .ar{transition:transform .2s}
        .bgt.hid .ar{transform:rotate(-90deg)}
        .bw-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:6px}
        .bw-grid.hid{display:none}
        .bw-item{padding:8px 12px;border-radius:10px;border:1px solid rgba(0,0,0,0.06);cursor:pointer;transition:0.3s cubic-bezier(0.16,1,0.3,1)}
        .bw-item:hover{border-color:rgba(192,57,43,0.2);background:rgba(192,57,43,0.02)}
        .bw-item .bw-w{font-size:15px;font-weight:600}
        .bw-item .bw-d{font-size:12px;color:#999;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .cb{position:fixed;top:14px;right:20px;z-index:210;pointer-events:auto}
        .loading{text-align:center;padding:40px;color:#999;font-size:16px}
        @media(max-width:768px){
            .sidebar{transform:translateX(-100%);width:280px}
            .sidebar.open{transform:translateX(0)}
            .menu-toggle{display:block}
            #main-screen{margin-left:0}
            .word-line{font-size:44px}
            .def-item{font-size:19px}
            #sr{left:50%;transform:translateX(-50%)}
            .nav-btns{bottom:100px}
            .nav-btn{width:48px;height:48px;font-size:18px}
        }
    </style>
</head>
<body oncontextmenu="return false">
<div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>
<button class="menu-toggle" id="menu-toggle" onclick="toggleSidebar()">&#9776;</button>
<div class="sidebar" id="sidebar">
    <a href="../index.html" class="sidebar-back">← 返回</a>
    <div class="sidebar-section collapsed" id="gs">
        <div class="sidebar-title" onclick="toggleSection(this)">词库分类</div>
        <div class="sidebar-section-body">
            <div class="pill gp active" id="g-bk" onclick="setGroup('必考词')">必考词</div>
            <div class="pill gp" id="g-jc" onclick="setGroup('基础词')">基础词</div>
            <div class="pill gp" id="g-jd" onclick="setGroup('简单基础词')">简单词</div>
            <div class="pill gp" id="g-cg" onclick="setGroup('超纲词')">超纲词</div>
        </div>
    </div>
    <div class="sidebar-section" id="us" style="display:none">
        <div class="sidebar-title" onclick="toggleSection(this)">单元</div>
        <div class="sidebar-section-body"><div id="up"></div></div>
    </div>
    <div class="sidebar-section" id="fs" style="display:none">
        <div class="sidebar-title" onclick="toggleSection(this)">收藏筛选</div>
        <div class="sidebar-section-body"><div id="ff"></div></div>
    </div>
    <div class="sidebar-section collapsed">
        <div class="sidebar-title" onclick="toggleSection(this)">浏览模式</div>
        <div class="sidebar-section-body">
            <div class="pill active" id="m-seq" onclick="setMode('seq')">顺序</div>
            <div class="pill" id="m-rand" onclick="setMode('rand')">随机</div>
            <div class="pill" id="m-reset" onclick="resetQ()">重置</div>
        </div>
    </div>
    <div class="sidebar-section collapsed">
        <div class="sidebar-title" onclick="toggleSection(this)">视图</div>
        <div class="sidebar-section-body">
            <div class="pill active" id="v-all" onclick="setView('all')">学习</div>
            <div class="pill" id="v-fav" onclick="setView('fav')">收藏</div>
            <div class="pill" id="browse-btn" onclick="toggleBrowse()">📚 浏览全部</div>
        </div>
    </div>
    <div class="sidebar-section collapsed">
        <div class="sidebar-title" onclick="toggleSection(this)">搜索</div>
        <div class="sidebar-section-body">
            <div class="search-box"><input id="si" placeholder="搜索单词..." oninput="doSearch(this.value)" onfocus="doSearch(this.value)" onblur="setTimeout(hideSR,200)"></div>
        </div>
    </div>
    <div class="sidebar-section">
        <div id="progress" class="tag" style="margin:0 18px;display:block;text-align:center">0/0</div>
    </div>
</div>
<div id="main-screen">
    <div class="word-card">
        <div class="word-line" id="dw">Loading...</div>
        <div id="dd"></div>
        <div class="page-info" id="dp"></div>
    </div>
    <div class="nav-btns">
        <button class="nav-btn" id="prev-btn" onclick="event.stopPropagation();goPrev()">◂</button>
        <button class="nav-btn" id="fav-btn" onclick="toggleFav(event)" style="width:48px;height:48px;font-size:24px">★</button>
        <button class="nav-btn" id="next-btn" onclick="event.stopPropagation();goNext()">▸</button>
    </div>
    <div class="hint">← → 方向键翻页</div>
</div>
<div id="sr"></div>
<div id="bv"><div class="cb"><div class="pill" onclick="toggleBrowse()">✕</div></div><div id="bc"></div></div>
<script src="english_data.js"></script>
<script>

const GMAP={'必考词':'bk','基础词':'jc','简单基础词':'jd','超纲词':'cg'};

let S=JSON.parse(localStorage.getItem('ws'))||{v:'all',g:'必考词',u:'all',s:'seq',ff:'all'};
let PM=JSON.parse(localStorage.getItem('wp'))||{};
let FV=JSON.parse(localStorage.getItem('wf'))||{};
let RQ=JSON.parse(localStorage.getItem('wr'))||{};
let Q=[],C=0,bOpen=false,sIdx=null;

const AC=new(window.AudioContext||window.webkitAudioContext)();
const NS=[261.63,293.66,329.63,349.23,392,440,493.88,523.25];
let ni=0;
function playN(d){const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.frequency.value=NS[((ni%NS.length)+NS.length)%NS.length];o.type='sine';g.gain.setValueAtTime(.1,AC.currentTime);g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+.2);o.start();o.stop(AC.currentTime+.2);ni+=d}

function getWords(){
    const gd=WD[S.g];
    if(!gd)return[];
    if(S.u==='all')return Object.entries(gd).flatMap(([p,ws])=>ws.map(w=>({w:w[0],d:w[1],p})));
    const ud=gd[S.u];if(!ud)return[];
    return ud.map(w=>({w:w[0],d:w[1],p:S.u}));
}

function buildQ(fr=false){
    let base,key=S.v+'_'+S.g+'_'+S.u+'_'+S.s;
    if(S.v==='fav'){base=Object.values(FV);if(S.ff!=='all')base=base.filter(w=>w.p===S.ff)}
    else base=getWords();
    if(!base.length){Q=[];C=0;renderE();return}
    if(S.s==='rand'){
        if(fr||!RQ[key]||RQ[key].length!==base.length){RQ[key]=[...base].sort(()=>Math.random()-.5);localStorage.setItem('wr',JSON.stringify(RQ))}
        Q=RQ[key];
    }else Q=base;
    C=fr?0:(PM[key]||0);if(C>=Q.length)C=0;
    renderW();updateFUI();
}

function renderW(){
    if(!Q.length)return;
    const w=Q[C];
    document.getElementById('dw').innerText=w.w;
    document.getElementById('dd').innerHTML=w.d.split(/[;；]/).map(d=>'<div class="def-item">'+d.trim()+'</div>').join('');
    document.getElementById('dp').innerText=w.p?'📖 '+w.p:'';
    document.getElementById('fav-btn').className=FV[w.w]?'active':'';
    document.getElementById('progress').innerText=(C+1)+'/'+Q.length;
    document.getElementById('prev-btn').disabled=C===0;
    document.getElementById('next-btn').disabled=C>=Q.length-1;
    PM[S.v+'_'+S.g+'_'+S.u+'_'+S.s]=C;
    localStorage.setItem('wp',JSON.stringify(PM));
}
function renderE(){document.getElementById('dw').innerText='暂无词汇';document.getElementById('dd').innerHTML='<div class="def-item">请选择分类</div>';document.getElementById('dp').innerText='';document.getElementById('progress').innerText='0/0'}

function toggleSection(titleEl){titleEl.parentElement.classList.toggle('collapsed')}

function goNext(){if(C<Q.length-1){C++;playN(1);renderW()}}

function goPrev(){if(C>0){C--;playN(-1);renderW()}}

function setMode(m){S.s=m;save();document.getElementById('m-seq').classList.toggle('active',m==='seq');document.getElementById('m-rand').classList.toggle('active',m==='rand');document.getElementById('m-reset').innerText=m==='rand'?'重洗':'重置';buildQ()}

function setGroup(g){S.g=g;S.u='all';save();document.querySelectorAll('#gs .pill').forEach(e=>e.classList.remove('active'));document.getElementById('g-'+GMAP[g]).classList.add('active');updateUS();buildQ()}

function setUnit(u){S.u=u;save();document.querySelectorAll('#up .pill').forEach(e=>e.classList.remove('active-sub'));const id='u_'+u.replace(/[^a-zA-Z0-9]/g,'_');const b=document.getElementById(id);if(b)b.classList.add('active-sub');buildQ()}

function updateUS(){
    document.getElementById('us').style.display='';
    const cd=CI[S.g];let h='<div class="pill active-sub" onclick="setUnit(&apos;all&apos;)">全部</div>';
    for(const p in cd){const id='u_'+p.replace(/[^a-zA-Z0-9]/g,'_');const s=p.replace(S.g,'')||p;h+='<div class="pill" id="'+id+'" onclick="setUnit(&apos;'+p.replace(/'/g,"&apos;")+'&apos;)">'+s+'('+cd[p]+')</div>'}
    document.getElementById('up').innerHTML=h;
}

function setView(v){S.v=v;save();document.getElementById('v-all').classList.toggle('active',v==='all');document.getElementById('v-fav').classList.toggle('active',v==='fav');document.getElementById('gs').style.display=v==='all'?'':'none';document.getElementById('us').style.display=v==='all'?'':'none';document.getElementById('fs').style.display=v==='fav'?'':'none';buildQ()}

function save(){localStorage.setItem('ws',JSON.stringify(S))}

function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('sidebar-overlay').classList.toggle('show')}

function toggleFav(e){e.stopPropagation();if(!Q.length)return;const w=Q[C];FV[w.w]?delete FV[w.w]:FV[w.w]=w;localStorage.setItem('wf',JSON.stringify(FV));document.getElementById('fav-btn').className=FV[w.w]?'active':''}

function updateFUI(){if(S.v!=='fav')return;const srcs=new Set(Object.values(FV).map(w=>w.p));let h='<div class="pill '+(S.ff==='all'?'active-sub':'')+'" onclick="setFF(&apos;all&apos;)">全部</div>';for(const s of srcs)h+='<div class="pill '+(S.ff===s?'active-sub':'')+'" onclick="setFF(&apos;'+s.replace(/'/g,"&apos;")+'&apos;)">'+s+'</div>';document.getElementById('ff').innerHTML=h}
function setFF(f){S.ff=f;save();buildQ()}
function resetQ(){buildQ(true)}

// Search
function ensureSI(){if(sIdx)return;sIdx=[];for(const[g,cd]of(Object.entries(WD)))for(const[p,ws]of(Object.entries(cd)))for(const w of ws)sIdx.push({w:w[0],d:w[1],p})}
function doSearch(q){const r=document.getElementById('sr');if(!q.trim()){r.classList.remove('show');return}ensureSI();const ql=q.toLowerCase().trim();const m=sIdx.filter(w=>w.w.toLowerCase().includes(ql)||w.d.toLowerCase().includes(ql)).slice(0,30);if(!m.length){r.innerHTML='<div class="loading">🔍 无匹配</div>'}else{r.innerHTML=m.map(w=>'<div class="si" onclick="goW(&apos;'+w.w.replace(/'/g,"&apos;")+'&apos;,&apos;'+w.p.replace(/'/g,"&apos;")+'&apos;)"><div class="si-w">'+w.w+'</div><div class="si-d">'+w.d+'</div><div class="si-p">'+w.p+'</div></div>').join('')}r.classList.add('show')}
function hideSR(){document.getElementById('sr').classList.remove('show')}

async function goW(word,page){
    hideSR();document.getElementById('si').value='';
    let group='必考词';for(const g of Object.keys(CI))if(page.startsWith(g)||page===g){group=g;break}
    S.v='all';S.g=group;S.u=page;S.s='seq';save();
    document.getElementById('v-all').classList.add('active');document.getElementById('v-fav').classList.remove('active');
    document.getElementById('gs').style.display='';
    document.querySelectorAll('#gs .pill').forEach(e=>e.classList.remove('active'));
    document.getElementById('g-'+GMAP[group]).classList.add('active');
    document.getElementById('m-seq').classList.add('active');document.getElementById('m-rand').classList.remove('active');
    updateUS();buildQ();
    const idx=Q.findIndex(w=>w.w===word);if(idx>=0){C=idx;renderW()}
    if(window.innerWidth<=768){document.getElementById('sidebar').classList.remove('open');document.getElementById('sidebar-overlay').classList.remove('show')}
}

// Browse
function toggleBrowse(){bOpen=!bOpen;document.getElementById('bv').classList.toggle('show',bOpen);if(bOpen)renderB()}
function renderB(){
    let h='';
    for(const[g,cd]of(Object.entries(WD))){
        for(const[p,ws]of(Object.entries(cd))){
            h+='<div class="bg"><div class="bgt" onclick="this.classList.toggle(&apos;hid&apos;);this.nextElementSibling.classList.toggle(&apos;hid&apos;)"><span>'+p+' <span class="ct">('+ws.length+'词)</span></span><span class="ar">▼</span></div><div class="bw-grid">'+ws.map(w=>'<div class="bw-item" onclick="goW(&apos;'+w[0].replace(/'/g,"&apos;")+'&apos;,&apos;'+p.replace(/'/g,"&apos;")+'&apos;)"><div class="bw-w">'+w[0]+'</div><div class="bw-d">'+w[1]+'</div></div>').join('')+'</div></div>'
        }
    }
    document.getElementById('bc').innerHTML=h;
}

// Init
window.onload=function(){
    document.getElementById('m-seq').classList.toggle('active',S.s==='seq');
    document.getElementById('m-rand').classList.toggle('active',S.s==='rand');
    document.getElementById('v-all').classList.toggle('active',S.v==='all');
    document.getElementById('v-fav').classList.toggle('active',S.v==='fav');
    document.getElementById('gs').style.display=S.v==='all'?'':'none';
    document.getElementById('us').style.display=S.v==='all'?'':'none';
    document.getElementById('fs').style.display=S.v==='fav'?'':'none';
    document.querySelectorAll('#gs .pill').forEach(e=>e.classList.remove('active'));
    const gb=document.getElementById('g-'+GMAP[S.g]);if(gb)gb.classList.add('active');
    if(S.g)updateUS();
    buildQ();
    document.addEventListener('keydown',function(e){
        if(e.key==='Escape'){var sb=document.getElementById('sidebar');if(sb.classList.contains('open')){sb.classList.remove('open');document.getElementById('sidebar-overlay').classList.remove('show')}}
        if(e.key==='ArrowRight'||e.key==='ArrowDown'){e.preventDefault();goNext()}
        if(e.key==='ArrowLeft'||e.key==='ArrowUp'){e.preventDefault();goPrev()}
    });
};
</script>
</body>
</html>
